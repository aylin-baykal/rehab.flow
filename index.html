<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhysioGuide</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <h1>PhysioGuide</h1>

    <p class="subtitle">
      Kişiselleştirilmiş fizyoterapi egzersiz rehberi
    </p>

    <!-- ROL SEÇİMİ -->
    <div id="role-selection">

      <h2>Rolünü Seç</h2>

      <button onclick="openPanel('hastaPanel')">
        🧍 Hasta
      </button>

      <button onclick="openPanel('fizyoterapistPanel')">
        🧑‍⚕️ Fizyoterapist
      </button>

    </div>

    <!-- HASTA PANEL -->
    <div id="hastaPanel" class="panel">

      <h2>Hasta Modu</h2>

      <p>
        Vücut bölgesini seç ve egzersizlere ulaş.
      </p>

      <!-- VÜCUT -->
      <div class="body-layout">

        <div class="image-wrapper">

          <img
            src="assets/body.png"
            class="human-body"
          />

          <!-- HOTSPOTS -->
          <div class="hotspot neck"
            onclick="selectBodyPart('Boyun')"></div>

          <div class="hotspot shoulder"
            onclick="selectBodyPart('Omuz')"></div>

          <div class="hotspot elbow"
            onclick="selectBodyPart('Dirsek')"></div>

          <div class="hotspot wrist"
            onclick="selectBodyPart('El Bileği')"></div>

          <div class="hotspot back"
            onclick="selectBodyPart('Sırt')"></div>

          <div class="hotspot waist"
            onclick="selectBodyPart('Bel')"></div>

          <div class="hotspot hip"
            onclick="selectBodyPart('Kalça')"></div>

          <div class="hotspot knee"
            onclick="selectBodyPart('Diz')"></div>

          <div class="hotspot ankle"
            onclick="selectBodyPart('Ayak Bileği')"></div>

          <div class="hotspot foot"
            onclick="selectBodyPart('Ayak')"></div>

        </div>

        <!-- BUTONLAR -->
        <div id="body-parts"></div>

      </div>

      <!-- HASTALIKLAR -->
      <div id="disease-section" class="hidden">

        <h2>Rahatsızlıklar</h2>

        <div id="disease-list"></div>

      </div>

    </div>

    <!-- FİZYOTERAPİST PANEL -->
    <div id="fizyoterapistPanel" class="panel">

      <h2>Fizyoterapist Paneli</h2>

      <p>
        Hasta yönetimi ve egzersiz planlama
      </p>

      <button onclick="createPatient()">
        + Hasta Ekle
      </button>

      <div id="patientList"></div>

    </div>

  </div>

  <script src="app.js"></script>

</body>
</html>
